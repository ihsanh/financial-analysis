# H2 in-memory profile — run with: --spring.profiles.active=h2
spring.datasource.url=jdbc:h2:mem:financial_analysis;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# dialect override — hem Spring hem Hibernate yolundan set et
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
