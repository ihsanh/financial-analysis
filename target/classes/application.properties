spring.application.name=financial-analysis

# application-local.properties varsa yükle (yerel API anahtarları için, gitignored)
spring.profiles.include=local

# JPA (dialect profillerde tanımlanır: h2 veya postgres)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Server
server.port=8080

# Actuator — OpenShift liveness/readiness probe endpoint'leri
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Gemini API — AI finansal yorum için
# Yerel geliştirme: export GEMINI_API_KEY=<anahtariniz>
# Docker / OpenShift: -e GEMINI_API_KEY=<anahtariniz>
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash

# Swagger UI — http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# Logging
logging.level.com.finanalysis=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Log dosyasına yaz
logging.file.name=logs/financial-analysis.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{50} - %msg%n
