# PostgreSQL profili için veritabanı kimlik bilgileri
# Değerleri base64 ile encode edin: echo -n "değer" | base64
# Örnek: echo -n "postgres" | base64  →  cG9zdGdyZXM=
apiVersion: v1
kind: Secret
metadata:
  name: financial-analysis-db-secret
type: Opaque
stringData:
  # stringData kullanılınca base64 encode gerekmez, OpenShift otomatik encode eder
  db-url: "jdbc:postgresql://financial-analysis-db:5432/financial_analysis"
  db-username: "postgres"
  db-password: "degistirin_beni"
